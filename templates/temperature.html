<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='duck.png') }}" sizes="32x32">

    <script src="https://cdn.plot.ly/plotly-2.18.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body, html {
            padding-bottom: 0;
            padding-top: 0;

        }
    </style>
</head>
<body>

<div class="info-container">
    <div class="info">
        <h2>Office Conditions</h2>
        <p>Current Temperature: <span id="currentTemperature">--</span> °C</p>
        <p>Average Temperature (Last 5 minutes): <span id="averageTemperature5Min">--</span> °C</p>
        <p>Average Temperature (Last 5 days): <span id="averageTemperature5Days">--</span> °C</p>
    </div>

    
</div>

<div class="container" style="height: 100%; display: flex; flex-direction: column;">
    <div id="chartContainer" class="chart-container info" style="min-height: 600px; flex-grow: 1; display: flex; flex-direction: column;">
        <div id="combinedChart" style="flex-grow: 1;"></div>
    </div>
</div>

<script>
    const socket = io();

    // Parse various timestamp formats into epoch milliseconds
    function parseTimestamp(ts) {
        if (ts === null || ts === undefined) return null;
        if (typeof ts === 'number') {
            // If seconds (e.g. 1620000000) convert to ms
            if (ts < 1e12) return ts * 1000;
            return ts;
        }
        const parsed = Date.parse(ts);
        return isNaN(parsed) ? null : parsed;
    }

    function computeAverageForMinutes(timestamps, temps, minutes) {
        if (!timestamps || !temps || timestamps.length === 0) return NaN;
        const now = Date.now();
        const cutoff = now - minutes * 60 * 1000;
        let sum = 0, count = 0;
        for (let i = timestamps.length - 1; i >= 0; i--) {
            const t = parseTimestamp(timestamps[i]);
            if (t === null) continue;
            if (t < cutoff) break; // timestamps assumed ordered ascending
            const val = Number(temps[i]);
            if (!isNaN(val)) { sum += val; count++; }
        }
        return count ? sum / count : NaN;
    }

    // Initialize Plotly chart for temperature and humidity on the same graph
    const layout = {
        title: 'Temperature and Humidity',
        showlegend: false,
        xaxis: { title: 'Time' },
        yaxis: { title: { text: 'Temperature (°C)', font: { color: 'red' } }, side: 'left' },
        yaxis2: { title: { text: 'Humidity (%)', font: { color: 'blue' } }, side: 'right', overlaying: 'y', showgrid: false },
        margin: { t: 50, r: 50, l: 50, b: 50 }
    };

    // Initial Plot for temperature and humidity
    Plotly.newPlot('combinedChart', [
        { x: [], y: [], mode: 'lines', name: 'Temperature', line: { color: 'red' }, yaxis: 'y' },
        { x: [], y: [], mode: 'lines', name: 'Humidity', line: { color: 'blue' }, yaxis: 'y2' }
    ], layout);

    // Fetch initial historical data for the last 'n' hours
    const hours = {{ input_hours }};  // You can make this dynamic based on user input

    fetch(`/get_last_hours/${hours}`)
        .then(response => response.json())
        .then(data => {
            const tempX = data.timestamps;
            const tempY = data.temperature_data;
            const humY = data.humidity_data;

            // Update the current temperature displayed when page loads
            document.getElementById('currentTemperature').innerText = data.temperature_data[data.temperature_data.length - 1].toFixed(2);

            // Populate the chart with historical data
            Plotly.restyle('combinedChart', 'x', [tempX]);
            Plotly.restyle('combinedChart', 'y', [tempY], 0);  // Update first y-axis for temperature
            Plotly.restyle('combinedChart', 'y', [humY], 1);   // Update second y-axis for humidity

            // Compute and set averages for last 5 minutes and last 5 days
            const avg5min = computeAverageForMinutes(tempX, tempY, 5);
            const avg5days = computeAverageForMinutes(tempX, tempY, 5 * 24 * 60);
            document.getElementById('averageTemperature5Min').innerText = isNaN(avg5min) ? '--' : avg5min.toFixed(2);
            document.getElementById('averageTemperature5Days').innerText = isNaN(avg5days) ? '--' : avg5days.toFixed(2);
        });

    // Listen for new data in real time and update the chart
    socket.on('new_data', function (data) {
        // Extend traces with new temperature and humidity data
        Plotly.extendTraces('combinedChart', { x: [[data.time]], y: [[data.temperature]] }, [0]);
        Plotly.extendTraces('combinedChart', { x: [[data.time]], y: [[data.humidity]] }, [1]);

        // Update the current temperature and averages displayed
        // Update current temperature (guard for missing values)
        const currentTempElem = document.getElementById('currentTemperature');
        if (typeof data.temperature === 'number' && !isNaN(data.temperature)) {
            currentTempElem.innerText = data.temperature.toFixed(2);
        } else {
            currentTempElem.innerText = '--';
        }

        // Compute averages from chart data as a fallback if server doesn't send them
        const chartEl = document.getElementById('combinedChart');
        const chartTimesRaw = (chartEl && chartEl.data && chartEl.data[0] && chartEl.data[0].x) ? chartEl.data[0].x : [];
        const chartTempsRaw = (chartEl && chartEl.data && chartEl.data[0] && chartEl.data[0].y) ? chartEl.data[0].y : [];
        // Flatten Plotly nested arrays if necessary
        const chartTimes = (Array.isArray(chartTimesRaw) && Array.isArray(chartTimesRaw[0]) && chartTimesRaw.length === 1) ? chartTimesRaw[0] : chartTimesRaw;
        const chartTemps = (Array.isArray(chartTempsRaw) && Array.isArray(chartTempsRaw[0]) && chartTempsRaw.length === 1) ? chartTempsRaw[0] : chartTempsRaw;

        const avg5minSocket = (data.average_temperature_5min !== undefined && !isNaN(Number(data.average_temperature_5min)))
            ? Number(data.average_temperature_5min)
            : computeAverageForMinutes(chartTimes, chartTemps, 5);
        const avg5daysSocket = (data.average_temperature_5days !== undefined && !isNaN(Number(data.average_temperature_5days)))
            ? Number(data.average_temperature_5days)
            : computeAverageForMinutes(chartTimes, chartTemps, 5 * 24 * 60);

        document.getElementById('averageTemperature5Min').innerText = isNaN(avg5minSocket) ? '--' : avg5minSocket.toFixed(2);
        document.getElementById('averageTemperature5Days').innerText = isNaN(avg5daysSocket) ? '--' : avg5daysSocket.toFixed(2);
    });

    const maxPoints = 60; // Adjust this based on your requirement

    function manageData() {
        // Fetch the current x data and limit it to the maxPoints
        const currentX = Plotly.d3.select('#combinedChart').data()[0].x;
        const currentYTemp = Plotly.d3.select('#combinedChart').data()[0].y[0];
        const currentYHum = Plotly.d3.select('#combinedChart').data()[1].y[0];

        if (currentX.length > maxPoints) {
            Plotly.restyle('combinedChart', {
                x: [currentX.slice(currentX.length - maxPoints)],
                y: [currentYTemp.slice(currentYTemp.length - maxPoints)],
            }, [0]);
            Plotly.restyle('combinedChart', {
                y: [currentYHum.slice(currentYHum.length - maxPoints)],
            }, [1]);
        }
    }

    // Call manageData after extending traces
    setInterval(() => {
        fetch(`/get_last_hours/${hours}`)
            .then(response => response.json())
            .then(data => {
                // Existing code for extending traces...
                manageData(); // Manage data after fetching new data
            });
    }, 60000); 

</script>

</body>
</html>
